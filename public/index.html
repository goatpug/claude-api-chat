<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spicy Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface2: #2e2e2e;
      --border: #383838;
      --text: #e8e8e8;
      --text-dim: #888;
      --accent: #c77dff;
      --accent-dim: #7b2fbe;
      --user-bg: #2a1f3d;
      --user-border: #5a3f8a;
      --assistant-bg: #1e2a1e;
      --assistant-border: #3a6b3a;
      --error: #ff6b6b;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      flex: 1;
      color: var(--accent);
    }

    button {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    button:hover { background: var(--border); }
    button:active { background: var(--accent-dim); border-color: var(--accent); }

    #btn-system-prompt.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── System prompt panel ── */
    #system-prompt-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #system-prompt-panel.visible { display: flex; }

    #system-prompt-panel label {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #system-prompt-textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
      padding: 10px 12px;
      resize: vertical;
      min-height: 120px;
      max-height: 300px;
    }

    #system-prompt-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    #system-prompt-panel .panel-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #system-prompt-save-status {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Chat area ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #chat-area::-webkit-scrollbar { width: 6px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 85%;
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.65;
      word-wrap: break-word;
    }

    .message.user .message-bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .message-bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--assistant-border);
      border-bottom-left-radius: 4px;
      position: relative;
    }

    /* Markdown styles inside assistant bubbles */
    .message-bubble p { margin-bottom: 0.6em; }
    .message-bubble p:last-child { margin-bottom: 0; }
    .message-bubble ul, .message-bubble ol { padding-left: 1.4em; margin-bottom: 0.6em; }
    .message-bubble li { margin-bottom: 0.2em; }
    .message-bubble h1, .message-bubble h2, .message-bubble h3 {
      margin: 0.8em 0 0.3em;
      font-size: 1em;
      font-weight: 700;
    }
    .message-bubble code {
      background: rgba(255,255,255,0.08);
      padding: 0.1em 0.35em;
      border-radius: 3px;
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 0.88em;
    }
    .message-bubble pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 0.6em 0;
    }
    .message-bubble pre code {
      background: none;
      padding: 0;
    }
    .message-bubble blockquote {
      border-left: 3px solid var(--accent-dim);
      padding-left: 12px;
      color: var(--text-dim);
      margin: 0.6em 0;
    }
    .message-bubble a { color: var(--accent); }
    .message-bubble hr { border: none; border-top: 1px solid var(--border); margin: 0.8em 0; }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      padding: 3px 8px;
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: 4px;
    }

    .message.assistant .message-bubble:hover .copy-btn { opacity: 1; }

    /* Error message */
    .message.error .message-bubble {
      background: rgba(255,107,107,0.1);
      border: 1px solid var(--error);
      color: var(--error);
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 14px;
      text-align: center;
      padding: 40px;
      line-height: 2;
    }

    /* ── Input area ── */
    #input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      padding: 10px 14px;
      resize: none;
      min-height: 44px;
      max-height: calc(5 * 1.5em + 20px);
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #message-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    #message-input::placeholder { color: var(--text-dim); }

    #message-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #send-btn {
      height: 44px;
      padding: 0 16px;
      background: var(--accent-dim);
      border-color: var(--accent);
      font-weight: 600;
      color: #fff;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- Header -->
    <div id="header">
      <h1>🌶️ Spicy Chat</h1>
      <button id="btn-system-prompt">System Prompt</button>
      <button id="btn-export">Export</button>
      <button id="btn-new-chat">New Chat</button>
    </div>

    <!-- System prompt panel -->
    <div id="system-prompt-panel">
      <label>System Prompt</label>
      <textarea id="system-prompt-textarea" spellcheck="false"></textarea>
      <div class="panel-actions">
        <button id="btn-save-system-prompt">Save</button>
        <span id="system-prompt-save-status"></span>
      </div>
    </div>

    <!-- Chat area -->
    <div id="chat-area">
      <div id="empty-state">No messages yet.<br>Say something. 🌶️</div>
    </div>

    <!-- Input -->
    <div id="input-area">
      <div id="input-row">
        <textarea
          id="message-input"
          placeholder="Type a message…"
          rows="1"
        ></textarea>
        <button id="send-btn">Send</button>
      </div>
      <div id="hint">Enter to send · Shift+Enter for newline</div>
    </div>

  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    marked.setOptions({ breaks: true, gfm: true });

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const chatArea        = document.getElementById('chat-area');
    const emptyState      = document.getElementById('empty-state');
    const messageInput    = document.getElementById('message-input');
    const sendBtn         = document.getElementById('send-btn');
    const btnNewChat      = document.getElementById('btn-new-chat');
    const btnExport       = document.getElementById('btn-export');
    const btnSystemPrompt = document.getElementById('btn-system-prompt');
    const systemPanel     = document.getElementById('system-prompt-panel');
    const systemTextarea  = document.getElementById('system-prompt-textarea');
    const btnSaveSystem   = document.getElementById('btn-save-system-prompt');
    const saveStatus      = document.getElementById('system-prompt-save-status');

    // ── State ────────────────────────────────────────────────────────────────
    let isLoading = false;

    // ── Helpers ──────────────────────────────────────────────────────────────
    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showEmptyState(show) {
      emptyState.style.display = show ? 'flex' : 'none';
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, parseInt(getComputedStyle(el).maxHeight)) + 'px';
    }

    function renderMessage(role, content) {
      showEmptyState(false);

      const wrapper = document.createElement('div');
      wrapper.classList.add('message', role);

      const label = document.createElement('div');
      label.className = 'message-label';
      label.textContent = role === 'user' ? 'You' : 'Claude';
      wrapper.appendChild(label);

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';

      if (role === 'assistant') {
        bubble.innerHTML = marked.parse(content);

        // Copy button
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = 'Copy';
        copyBtn.addEventListener('click', () => {
          navigator.clipboard.writeText(content).then(() => {
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
          });
        });
        bubble.appendChild(copyBtn);
      } else {
        bubble.textContent = content;
      }

      wrapper.appendChild(bubble);
      chatArea.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    function renderError(msg) {
      showEmptyState(false);
      const wrapper = document.createElement('div');
      wrapper.classList.add('message', 'error');

      const label = document.createElement('div');
      label.className = 'message-label';
      label.textContent = 'Error';
      wrapper.appendChild(label);

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = msg;
      wrapper.appendChild(bubble);

      chatArea.appendChild(wrapper);
      scrollToBottom();
    }

    function setLoading(loading) {
      isLoading = loading;
      messageInput.disabled = loading;
      sendBtn.disabled = loading;
      sendBtn.innerHTML = loading ? '<span class="spinner"></span>' : 'Send';
    }

    // ── Load history on startup ──────────────────────────────────────────────
    async function loadHistory() {
      try {
        const res = await fetch('/api/history');
        const history = await res.json();
        if (history.length === 0) {
          showEmptyState(true);
        } else {
          showEmptyState(false);
          history.forEach(msg => renderMessage(msg.role, msg.content));
        }
      } catch (err) {
        renderError('Failed to load history: ' + err.message);
      }
    }

    // ── Load system prompt on startup ────────────────────────────────────────
    async function loadSystemPrompt() {
      try {
        const res = await fetch('/api/system-prompt');
        const data = await res.json();
        systemTextarea.value = data.content;
      } catch (err) {
        console.warn('Could not load system prompt:', err.message);
      }
    }

    // ── Send message ─────────────────────────────────────────────────────────
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || isLoading) return;

      messageInput.value = '';
      autoResize(messageInput);
      renderMessage('user', text);
      setLoading(true);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();

        if (!res.ok) {
          renderError(data.error || 'Something went wrong.');
        } else {
          renderMessage('assistant', data.response);
        }
      } catch (err) {
        renderError('Network error: ' + err.message);
      } finally {
        setLoading(false);
        messageInput.focus();
      }
    }

    // ── Export conversation ──────────────────────────────────────────────────
    async function exportChat() {
      try {
        const res = await fetch('/api/history');
        const history = await res.json();

        if (history.length === 0) {
          alert('No messages to export.');
          return;
        }

        // Format as markdown
        const timestamp = new Date().toISOString().split('T')[0];
        let markdown = `# Spicy Chat Export — ${timestamp}\n\n`;

        history.forEach(msg => {
          const role = msg.role === 'user' ? '**You:**' : '**Claude:**';
          markdown += `${role}\n\n${msg.content}\n\n---\n\n`;
        });

        // Create download
        const blob = new Blob([markdown], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `spicy-chat-${timestamp}.md`;
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        renderError('Export failed: ' + err.message);
      }
    }

    // ── New chat ─────────────────────────────────────────────────────────────
    async function newChat() {
      if (!confirm('Clear conversation history?')) return;
      try {
        await fetch('/api/history', { method: 'DELETE' });
        // Remove all message elements
        const messages = chatArea.querySelectorAll('.message');
        messages.forEach(m => m.remove());
        showEmptyState(true);
      } catch (err) {
        renderError('Failed to clear history: ' + err.message);
      }
    }

    // ── Save system prompt ───────────────────────────────────────────────────
    async function saveSystemPrompt() {
      const content = systemTextarea.value;
      saveStatus.textContent = 'Saving…';
      try {
        const res = await fetch('/api/system-prompt', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        });
        if (res.ok) {
          saveStatus.textContent = 'Saved ✓';
          setTimeout(() => { saveStatus.textContent = ''; }, 2000);
        } else {
          saveStatus.textContent = 'Save failed.';
        }
      } catch {
        saveStatus.textContent = 'Save failed.';
      }
    }

    // ── Event listeners ──────────────────────────────────────────────────────
    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    messageInput.addEventListener('input', () => autoResize(messageInput));

    btnExport.addEventListener('click', exportChat);
    btnNewChat.addEventListener('click', newChat);

    btnSystemPrompt.addEventListener('click', () => {
      const visible = systemPanel.classList.toggle('visible');
      btnSystemPrompt.classList.toggle('active', visible);
    });

    btnSaveSystem.addEventListener('click', saveSystemPrompt);

    // ── Init ─────────────────────────────────────────────────────────────────
    loadHistory();
    loadSystemPrompt();
    messageInput.focus();
  </script>
</body>
</html>
